# Based partially on Alyxia's work, thanks so much!

name: Release
on:
  push:
    tags:
      - v*

env:
  FORCE_COLOR: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libsdl2-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libglx-dev libgl1-mesa-dev libxxf86vm-dev libglfw3-dev libwayland-dev libwayland-egl1 libegl-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Install Go dependencies
        run: go get -v

      - name: Recreate vendor and apply Wayland patches
        run: |
          go mod vendor
          git apply patches/wayland.patch

      - name: Build GUI (X11)
        run:
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags static -ldflags "-s
          -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short
          HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o
          EsharqInstaller-x11

      - name: Build GUI (Wayland)
        run:
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags "static wayland"
          -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git
          rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{
          github.ref_name }}'" -o EsharqInstaller-wayland

      - name: Build GUI (Combined)
        run:
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags "static combined"
          -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git
          rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{
          github.ref_name }}'" -o EsharqInstaller

      - name: Build CLI
        run:
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags "cli" -ldflags "-s
          -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short
          HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o
          EsharqInstallerCli-linux

      - name: Update executable
        run: |
          chmod +x EsharqInstaller*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EsharqInstaller-linux
          path: |
            EsharqInstaller-x11
            EsharqInstaller-wayland
            EsharqInstaller
            EsharqInstallerCli-linux

  build-mac:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
            artifact_name: EsharqInstaller-macos
            gui_name: EsharqInstaller-darwin-x64.zip
            cli_name: EsharqInstallerCli-darwin-x64
          - arch: arm64
            runner: macos-latest
            artifact_name: EsharqInstaller-macos-arm64
            gui_name: EsharqInstaller-darwin-arm64.zip
            cli_name: EsharqInstallerCli-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ matrix.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-go-

      - name: Install dependencies
        run: brew install sdl2

      - name: Install Go dependencies
        run: go get -v

      - name: Build GUI
        run: CGO_CFLAGS="-mmacosx-version-min=10.15"
          CGO_LDFLAGS="-mmacosx-version-min=10.15" CGO_ENABLED=1 GOOS=darwin
          GOARCH=${{ matrix.arch }} go build -v -tags "static gui" -ldflags "-s
          -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short
          HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o
          EsharqInstaller

      - name: Build CLI
        run: CGO_CFLAGS="-mmacosx-version-min=10.15"
          CGO_LDFLAGS="-mmacosx-version-min=10.15" CGO_ENABLED=1 GOOS=darwin
          GOARCH=${{ matrix.arch }} go build -v -tags "cli" -ldflags "-s
          -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short
          HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o
          ${{ matrix.cli_name }}

      - name: Update executable
        run: |
          chmod +x EsharqInstaller*

      - name: Generate Esharq .icns from EA logo
        run: |
          mkdir -p icon.iconset
          sips -z 16 16   winres/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32   winres/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32   winres/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64   winres/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 winres/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 winres/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 winres/icon.png --out icon.iconset/icon_256x256.png
          iconutil -c icns icon.iconset -o macos/icon.icns

      - name: Generate MacOS GUI bundle
        run: |
          mkdir -p EsharqInstaller.app/Contents/MacOS
          mkdir -p EsharqInstaller.app/Contents/Resources
          cp macos/Info.plist EsharqInstaller.app/Contents/Info.plist
          mv EsharqInstaller EsharqInstaller.app/Contents/MacOS/EsharqInstaller
          cp macos/icon.icns EsharqInstaller.app/Contents/Resources/icon.icns

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then echo "No Apple signing cert configured — skipping macOS signing (unsigned build)."; exit 0; fi
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Sign the executables
        env:
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
        run: |
          if [ -z "$CSC_LINK" ]; then echo "No Apple signing cert — skipping codesign (unsigned build)."; exit 0; fi
          codesign --force --options runtime --sign "Developer ID Application" EsharqInstaller.app/Contents/MacOS/EsharqInstaller
          codesign --force --options runtime --sign "Developer ID Application" EsharqInstaller.app
          codesign --force --options runtime --sign "Developer ID Application" ${{ matrix.cli_name }}

      - name: Notarize the executables
        env:
          API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "$API_KEY" ]; then echo "No Apple API key — skipping notarization."; exit 0; fi
          echo "$API_KEY" > apple.p8
          ditto -c -k --keepParent EsharqInstaller.app EsharqInstaller-notarize.zip
          ditto -c -k ${{ matrix.cli_name }} EsharqInstallerCli-notarize.zip
          xcrun notarytool submit EsharqInstaller-notarize.zip --key apple.p8 --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple EsharqInstaller.app
          xcrun notarytool submit EsharqInstallerCli-notarize.zip --key apple.p8 --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          rm apple.p8 EsharqInstaller-notarize.zip EsharqInstallerCli-notarize.zip

      - name: Create final zip
        run: zip -r ${{ matrix.gui_name }} EsharqInstaller.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.gui_name }}
            ${{ matrix.cli_name }}

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          path-type: inherit

      - name: Install Windows dependencies
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2

      - name: Install Go dependencies
        shell: msys2 {0}
        run: |
          go get -v
          go install github.com/tc-hib/go-winres@latest

      - name: Build GUI
        shell: msys2 {0}
        run: |
          go-winres make --product-version "git-tag"
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "static gui" -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o EsharqInstaller.exe

      - name: Build CLI
        shell: msys2 {0}
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "cli" -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=${{ github.ref_name }}'" -o EsharqInstallerCli.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EsharqInstaller-windows
          path: |
            EsharqInstaller.exe
            EsharqInstallerCli.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: "Download Linux Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: EsharqInstaller-linux
          path: linux

      - name: "Download MacOS Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: EsharqInstaller-macos
          path: macos

      - uses: actions/download-artifact@v8
        with:
          name: EsharqInstaller-macos-arm64
          path: macos

      - name: "Download Windows Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: EsharqInstaller-windows
          path: windows

      - name: Delete existing release
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          make_latest: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
          body: |
            This is release ${{ github.ref_name }} of EsharqInstaller.
          files: |
            linux/EsharqInstaller-x11
            linux/EsharqInstaller-wayland
            linux/EsharqInstaller
            linux/EsharqInstallerCli-linux
            macos/EsharqInstaller-darwin-x64.zip
            macos/EsharqInstaller-darwin-arm64.zip
            macos/EsharqInstallerCli-darwin-x64
            macos/EsharqInstallerCli-darwin-arm64
            windows/EsharqInstaller*.exe
